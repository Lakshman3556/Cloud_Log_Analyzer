<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Log Analyzer</title>
  <!-- TailwindCSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slateBg: '#020617',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center px-4 relative overflow-hidden">
  <!-- Background orbits -->
  <div class="pointer-events-none absolute inset-0 -z-10">
    <div class="absolute -top-32 -right-32 h-80 w-80 rounded-full bg-gradient-to-br from-blue-500/30 via-cyan-400/10 to-transparent blur-3xl"></div>
    <div class="absolute -bottom-32 -left-10 h-72 w-72 rounded-full bg-gradient-to-tr from-indigo-600/25 via-fuchsia-500/10 to-transparent blur-3xl"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_#0f172a_0,_#020617_55%,_#000_100%)] opacity-80"></div>
    <div class="absolute inset-0 opacity-40 mix-blend-soft-light"
         style="background-image: linear-gradient(to_right, rgba(148,163,184,0.15)_1px, transparent_1px), linear-gradient(to_bottom, rgba(148,163,184,0.08)_1px, transparent_1px); background-size: 56px_56px;">
    </div>
  </div>

  <div class="max-w-5xl w-full mx-auto grid grid-cols-1 lg:grid-cols-[1.2fr,1fr] gap-8 items-center">
    <!-- Left: Brand / hero -->
    <section class="space-y-6">
      <div>
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-semibold tracking-tight">
          Cloud <span class="bg-gradient-to-r from-blue-400 via-cyan-300 to-emerald-300 bg-clip-text text-transparent">Log Analyzer</span>
        </h1>
        <p class="mt-3 text-sm sm:text-base text-slate-300 max-w-xl">
          Sign in to monitor authentication trails, detect anomalies, and trace threats in real time.
        </p>
      </div>
    </section>

    <!-- Right: Login card -->
    <section class="w-full">
      <div class="bg-slateBg/80 border border-slate-800/80 rounded-2xl shadow-2xl shadow-black/40 p-6 sm:p-7 lg:p-8 backdrop-blur-xl">
        <div class="mb-6">
          <p class="text-[11px] uppercase tracking-[0.25em] text-slate-500 mb-1">Secure Console</p>
          <h2 class="text-lg sm:text-xl font-semibold tracking-tight">Sign in</h2>
        </div>

        {% if message %}
        <div class="mb-4 text-xs sm:text-sm rounded-xl border px-3 py-2.5 flex items-start gap-2.5
                    {% if status == 'success' %}
                      border-emerald-500/60 bg-emerald-500/10 text-emerald-200
                    {% else %}
                      border-rose-500/60 bg-rose-500/10 text-rose-200
                    {% endif %}">
          <div class="mt-0.5 h-1.5 w-1.5 rounded-full
                      {% if status == 'success' %}
                        bg-emerald-400
                      {% else %}
                        bg-rose-400
                      {% endif %}"></div>
          <p>{{ message }}</p>
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
          <div class="space-y-1.5">
            <label for="username" class="block text-xs font-medium text-slate-200">Username</label>
            <input id="username" name="username" required
                   class="block w-full rounded-xl border border-slate-700/80 bg-slate-900/70 px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
          </div>

          <div class="space-y-1.5">
            <label for="password" class="block text-xs font-medium text-slate-200">Password</label>
            <input id="password" name="password" type="password" required
                   class="block w-full rounded-xl border border-slate-700/80 bg-slate-900/70 px-3 py-2 text-sm placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
          </div>

          <button type="submit"
                  class="w-full inline-flex items-center justify-center rounded-full bg-gradient-to-r from-blue-500 via-indigo-500 to-cyan-400 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-blue-900/40 hover:from-blue-400 hover:via-indigo-400 hover:to-cyan-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-950 focus:ring-blue-500 transition">
            Enter console
          </button>
        </form>
      </div>
    </section>
  </div>
</body>
</html>
